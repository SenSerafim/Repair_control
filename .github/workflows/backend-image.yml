name: backend-image

# Сборка docker-образа backend и публикация в GitHub Container Registry (GHCR).
# Сервер 193.181.209.219 имеет 14GB диска — собирать там нельзя (упирается
# в ENOSPC при export image). Поэтому сборка переезжает в CI, на сервер
# приходит уже готовый образ через `docker compose pull`.
#
# Полный flow деплоя:
#   1. Push в main или dev_v1 → этот workflow собирает образ
#      ghcr.io/<owner>/<repo>/backend:<tag>
#   2. На сервере: `cd backend && docker compose pull api && docker compose up -d`
#      (см. backend/scripts/server-update.sh).

on:
  push:
    branches: [main, dev_v1]
    paths:
      - 'backend/**'
      - '.github/workflows/backend-image.yml'
  workflow_dispatch: # ручной запуск из UI Actions

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/backend

jobs:
  build-and-push:
    name: Build & Push to GHCR
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          # Тэги:
          #   - main      → ghcr.io/.../backend:main, :latest
          #   - dev_v1    → ghcr.io/.../backend:dev_v1
          #   - <sha>     → ghcr.io/.../backend:sha-<7chars> (для rollback)
          tags: |
            type=ref,event=branch
            type=sha,prefix=sha-,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: backend
          file: backend/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # GitHub Actions cache для buildx — ускоряет повторные сборки в 3-5 раз.
          cache-from: type=gha
          cache-to: type=gha,mode=max
          # Целевой stage из multi-stage Dockerfile.
          target: runtime
          # Multi-arch не нужен — сервер x86_64 Ubuntu.
          platforms: linux/amd64
