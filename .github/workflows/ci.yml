name: CI

on:
  pull_request:
    branches: [dev_v1, main]
  push:
    branches: [dev_v1, main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend · lint + build + e2e
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    timeout-minutes: 15

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install deps
        run: npm ci

      - name: Prisma generate
        run: npx prisma generate

      - name: Lint
        run: npm run lint:check

      - name: Build
        run: npm run build

      - name: Prepare .env.test
        run: |
          cat > .env.test <<EOF
          NODE_ENV=test
          PORT=3000
          DATABASE_URL=postgresql://postgres:postgres@localhost:5432/repair_control_test?schema=public
          REDIS_HOST=localhost
          REDIS_PORT=6379
          JWT_ACCESS_SECRET=ci_access_secret_at_least_16ch
          JWT_REFRESH_SECRET=ci_refresh_secret_at_least_16ch
          JWT_ACCESS_TTL=900
          JWT_REFRESH_TTL=2592000
          BCRYPT_COST=4
          SMS_PROVIDER=stub
          SMS_API_KEY=
          MINIO_ENDPOINT=localhost
          MINIO_PORT=9000
          MINIO_USE_SSL=false
          MINIO_ACCESS_KEY=ci_access
          MINIO_SECRET_KEY=ci_secret_at_least_8
          MINIO_BUCKET=repair-control
          MINIO_PRESIGN_TTL_SECONDS=300
          FILE_MAX_SIZE_MB=25
          FILE_ALLOWED_MIMES=image/jpeg,image/png,application/pdf
          RATE_LIMIT_LOGIN_MAX=5
          RATE_LIMIT_LOGIN_WINDOW_SECONDS=300
          RATE_LIMIT_LOGIN_BLOCK_SECONDS=300
          RECOVERY_MAX_ATTEMPTS=3
          RECOVERY_BLOCK_SECONDS=300
          LOG_LEVEL=warn
          E2E_SILENT=1
          EOF

      - name: E2E tests (global-setup migrates + seeds автоматически)
        run: npm run test:e2e
        env:
          # Fallback env для любых шагов, которые читают из process.env напрямую
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/repair_control_test?schema=public
