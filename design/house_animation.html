<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Домик прогресса</title>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root{
  --brand:#4F6EF7;--brand-dark:#3A56D4;
  --green:#059669;--green-mid:#10B981;--green-light:#D1FAE5;
  --yellow:#92400E;--yellow-dot:#F59E0B;--yellow-bg:#FEF3C7;
  --orange:#C2410C;--orange-dot:#EA580C;
  --red:#991B1B;--red-dot:#DC2626;--red-bg:#FEE2E2;
  --n0:#FFF;--n50:#F8FAFF;--n100:#F1F4FD;--n200:#E4E9F7;
  --n400:#8E9BBF;--n600:#3D4B70;--n900:#0D1229;
}
*{margin:0;padding:0;box-sizing:border-box}
body{
  font-family:'Manrope',sans-serif;
  background:linear-gradient(145deg,#0D1229,#1A2240 50%,#0F1A3A);
  min-height:100vh;display:flex;flex-direction:column;align-items:center;
  justify-content:center;padding:24px 16px 40px;gap:24px;
}
.phone{
  width:390px;height:844px;background:var(--n50);border-radius:52px;
  overflow:hidden;position:relative;display:flex;flex-direction:column;
  box-shadow:0 0 0 1px rgba(255,255,255,0.12),0 0 0 11px #10163A,
    0 0 0 13px rgba(79,110,247,0.25),0 50px 100px rgba(0,0,0,0.75);
}
.sb{display:flex;justify-content:space-between;align-items:center;padding:14px 28px 8px;font-size:15px;font-weight:700;color:var(--n900);flex-shrink:0}
.hdr{padding:8px 20px 14px;display:flex;align-items:center;gap:12px}
.hdr-back{width:36px;height:36px;background:var(--n0);border:1px solid var(--n200);border-radius:12px;display:flex;align-items:center;justify-content:center}
.hdr-title{flex:1;font-size:17px;font-weight:800;color:var(--n900);letter-spacing:-0.4px}
.traffic{display:flex;align-items:center;gap:6px;padding:4px 12px 4px 8px;border-radius:100px;font-size:12px;font-weight:800;transition:all .4s}
.traffic-dot{width:8px;height:8px;border-radius:50%;transition:background .4s}
.tl-green{background:var(--green-light);color:#065F46}.tl-green .traffic-dot{background:var(--green-mid)}
.tl-yellow{background:var(--yellow-bg);color:var(--yellow)}.tl-yellow .traffic-dot{background:var(--yellow-dot)}
.tl-red{background:var(--red-bg);color:var(--red)}.tl-red .traffic-dot{background:var(--red-dot)}
.tl-blue{background:#EEF2FF;color:#1E40AF}.tl-blue .traffic-dot{background:var(--brand)}

.scene{
  position:relative;width:100%;height:320px;
  background:linear-gradient(180deg,#E8EDF5 0%,#DDE3EE 60%,#D5DBE8 100%);
  display:flex;align-items:center;justify-content:center;
  overflow:hidden;transition:background 1.2s;
}
.scene.wow-bg{background:linear-gradient(180deg,#DEE5EF 0%,#C8D2E0 40%,#B8C4D6 100%)}
.ground{position:absolute;bottom:0;left:0;right:0;height:36px;
  background:linear-gradient(180deg,#BFC8D4 0%,#AEB8C6 100%);
  border-top:1px solid rgba(0,0,0,0.06)}

.confetti-box{position:absolute;inset:0;pointer-events:none;overflow:hidden;z-index:20}
.cp{position:absolute;top:-20px;animation:confettiFall linear forwards}
@keyframes confettiFall{0%{transform:translateY(0) rotate(0);opacity:1}80%{opacity:.9}100%{transform:translateY(900px) rotate(720deg);opacity:0}}
.wow-shimmer{position:absolute;inset:0;background:linear-gradient(90deg,transparent 30%,rgba(255,255,255,.2) 50%,transparent 70%);background-size:200% 100%;opacity:0;transition:opacity 1s;pointer-events:none;z-index:10}
.wow-shimmer.on{opacity:1;animation:shimMove 2s ease-in-out infinite}
@keyframes shimMove{0%{background-position:200% 0}100%{background-position:-200% 0}}

.wow-banner{
  position:absolute;top:50%;left:50%;
  transform:translate(-50%,-50%) translateY(-20px) scale(.7);
  opacity:0;z-index:25;transition:all .7s cubic-bezier(.34,1.56,.64,1);pointer-events:none;
}
.wow-banner.on{opacity:1;transform:translate(-50%,-50%) translateY(0) scale(1)}
.wow-banner-inner{
  background:linear-gradient(135deg,#059669,#10B981);
  color:#fff;padding:14px 36px;border-radius:100px;
  font-size:17px;font-weight:900;letter-spacing:-.3px;
  box-shadow:0 8px 40px rgba(5,150,105,.35),0 0 0 2px rgba(255,255,255,.15);
  white-space:nowrap;
}

.wow-glow{
  position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
  width:260px;height:260px;border-radius:50%;
  background:radial-gradient(circle,rgba(16,185,129,.12) 0%,transparent 70%);
  opacity:0;transition:opacity 1s;pointer-events:none;z-index:1;
}
.wow-glow.on{opacity:1;animation:glowPulse 2s ease-in-out infinite}
@keyframes glowPulse{0%,100%{transform:translate(-50%,-50%) scale(1);opacity:.8}50%{transform:translate(-50%,-50%) scale(1.08);opacity:1}}

.house{position:relative;width:220px;height:240px;z-index:2;margin-top:8px}
.house.wow-bounce{animation:hBounce .7s cubic-bezier(.34,1.56,.64,1)}
@keyframes hBounce{0%{transform:scale(1)}25%{transform:scale(1.07)}50%{transform:scale(.97)}75%{transform:scale(1.02)}100%{transform:scale(1)}}
.house.wow-pulse{animation:hPulse 1.5s ease-in-out infinite}
@keyframes hPulse{0%,100%{filter:drop-shadow(0 0 0 transparent)}50%{filter:drop-shadow(0 0 16px rgba(16,185,129,.2))}}

.hp{position:absolute;opacity:0;transform:translateY(4px);transition:opacity .45s,transform .45s cubic-bezier(.34,1.56,.64,1)}
.hp.on{opacity:1;transform:translateY(0)}

.s-fnd{bottom:0;left:16px;right:16px;height:18px;background:linear-gradient(180deg,#9CA3AF,#838B98);box-shadow:0 2px 6px rgba(0,0,0,.1)}
.s-fnd::after{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:rgba(255,255,255,.1)}
.s-socle{bottom:18px;left:12px;right:12px;height:8px;background:linear-gradient(180deg,#B0B7C3,#A0A8B4)}
.s-socle::after{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:rgba(255,255,255,.12)}
.s-w1{bottom:26px;left:20px;right:20px;height:64px;background:linear-gradient(180deg,#F0EDE8,#E6E2DA);border:1px solid rgba(0,0,0,.04);border-bottom:none}
.s-ceil{bottom:90px;left:16px;right:16px;height:6px;background:linear-gradient(180deg,#BFC8D4,#AEB8C6)}
.s-w2{bottom:96px;left:20px;right:20px;height:54px;background:linear-gradient(180deg,#F0EDE8,#E6E2DA);border:1px solid rgba(0,0,0,.04);border-bottom:none}
.s-raft{bottom:150px;left:6px;right:6px;height:12px;background:linear-gradient(180deg,#8E96A4,#7E8694);clip-path:polygon(0 100%,50% 0,100% 100%)}
.s-roof{bottom:150px;left:0;right:0;height:48px;clip-path:polygon(0 100%,50% 0,100% 100%);background:linear-gradient(180deg,#5C6B80,#475569);box-shadow:0 -2px 12px rgba(0,0,0,.08)}
.s-roof::after{content:'';position:absolute;inset:3px 4px 0;clip-path:polygon(0 100%,50% 0,100% 100%);background:linear-gradient(180deg,#64748B,#4F5D72)}
.s-facade{bottom:26px;left:20px;right:20px;height:124px;pointer-events:none}
.s-winch{bottom:0;left:0;right:0;height:240px;pointer-events:none}
.s-wow{inset:0;pointer-events:none}
.s-wow svg{width:100%;height:100%}

.fl{position:absolute;left:8px;right:8px;height:1px;background:rgba(0,0,0,.035)}
.door-surround{position:absolute;bottom:0;left:50%;transform:translateX(-50%);width:30px;height:40px;background:#969DAA;border-radius:2px 2px 0 0}
.door{position:absolute;bottom:0;left:50%;transform:translateX(-50%);width:26px;height:38px;background:linear-gradient(180deg,#6B5A46,#52422F);border-radius:2px 2px 0 0}
.door-panel{position:absolute;background:rgba(0,0,0,.06);border-radius:1px}
.door-knob{position:absolute;right:4px;top:52%;width:3px;height:3px;border-radius:50%;background:#A8B0BC}
.door-lintel{position:absolute;bottom:40px;left:50%;transform:translateX(-50%);width:34px;height:3px;background:#B0B7C3;border-radius:.5px}
.door-step{position:absolute;bottom:-2px;left:50%;transform:translateX(-50%);width:36px;height:3px;background:#969DAA;border-radius:.5px}

.win{position:absolute;border:1.5px solid #969DAA;border-radius:2px;overflow:hidden;background:linear-gradient(135deg,#C5D3E0,#A8BDCF,#90A8BE)}
.win::after{content:'';position:absolute;top:2px;left:2px;width:5px;height:5px;background:linear-gradient(135deg,rgba(255,255,255,.4),transparent);border-radius:1px}
.win-v{position:absolute;left:50%;top:0;bottom:0;width:1px;background:rgba(255,255,255,.35);transform:translateX(-.5px)}
.win-h{position:absolute;top:50%;left:0;right:0;height:1px;background:rgba(255,255,255,.35);transform:translateY(-.5px)}
.win-sill{position:absolute;height:2.5px;background:#969DAA;border-radius:.5px}
.win-lintel{position:absolute;height:2.5px;background:#B0B7C3;border-radius:.5px}

.chimney-box{position:absolute;pointer-events:none}
.chim-body{position:absolute;bottom:0;left:0;width:14px;height:22px;background:linear-gradient(180deg,#8B7355,#6E5B42);border-radius:1px 1px 0 0}
.chim-cap{position:absolute;bottom:22px;left:-2px;width:18px;height:4px;background:#7B6B4A;border-radius:.5px}
.chim-smoke{position:absolute;bottom:26px;left:3px}
.smoke-p{position:absolute;border-radius:50%;background:rgba(0,0,0,.04);animation:smokeUp linear infinite}
@keyframes smokeUp{0%{transform:translate(0,0) scale(.4);opacity:.05}50%{opacity:.025}100%{transform:translate(-5px,-24px) scale(1.1);opacity:0}}

.info{padding:16px 20px 12px;background:var(--n0);flex-shrink:0}
.pct-row{display:flex;align-items:baseline;gap:8px;margin-bottom:4px}
.pct-num{font-size:36px;font-weight:900;letter-spacing:-2px;transition:color .4s}
.pct-label{font-size:13px;font-weight:700;color:var(--n400)}
.stage-name{font-size:15px;font-weight:700;color:var(--n600);margin-bottom:12px;min-height:22px;transition:color .4s}
.pips{display:flex;gap:4px;margin-bottom:16px}
.pip{flex:1;height:6px;border-radius:3px;background:var(--n100);overflow:hidden;position:relative}
.pip-fill{position:absolute;inset:0;border-radius:3px;transform:scaleX(0);transform-origin:left;transition:transform .5s cubic-bezier(.34,1.56,.64,1)}
.pip.done .pip-fill{transform:scaleX(1)}
.pip.celebrate{animation:pipC .5s cubic-bezier(.34,1.56,.64,1)}
@keyframes pipC{0%{transform:scaleY(1)}40%{transform:scaleY(2.2)}100%{transform:scaleY(1)}}
.stats{display:flex;gap:8px;padding:0 20px 16px}
.stat{flex:1;background:var(--n0);border:1px solid var(--n200);border-radius:14px;padding:10px 12px;text-align:center}
.stat-val{font-size:18px;font-weight:900;color:var(--n900);letter-spacing:-.5px}
.stat-label{font-size:10px;font-weight:700;color:var(--n400);margin-top:2px;text-transform:uppercase;letter-spacing:.3px}
.stat.wow-pulse .stat-val{animation:stP .6s cubic-bezier(.34,1.56,.64,1)}
@keyframes stP{0%{transform:scale(1)}40%{transform:scale(1.2);color:#059669}100%{transform:scale(1)}}
.slider-wrap{padding:6px 20px 0}
.slider-track{position:relative;height:40px;display:flex;align-items:center}
input[type=range]{width:100%;-webkit-appearance:none;background:transparent;position:relative;z-index:2}
input[type=range]::-webkit-slider-runnable-track{height:6px;background:var(--n200);border-radius:3px}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:28px;height:28px;border-radius:50%;background:linear-gradient(135deg,var(--brand),var(--brand-dark));border:3px solid #fff;box-shadow:0 2px 10px rgba(79,110,247,.4);margin-top:-11px;cursor:pointer;transition:transform .15s}
input[type=range]::-webkit-slider-thumb:active{transform:scale(1.15)}
.slider-label{text-align:center;font-size:11px;font-weight:700;color:var(--n400);padding:6px 0 16px}
.demo-info{width:100%;max-width:420px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:20px;padding:16px 20px;text-align:center}
.demo-title{font-size:14px;font-weight:800;color:rgba(255,255,255,.85)}
.demo-sub{font-size:12px;font-weight:600;color:rgba(255,255,255,.35);margin-top:4px}
</style>
</head>
<body>
<div class="phone">
  <div class="sb"><span>9:41</span><div style="display:flex;align-items:center;gap:6px"><svg width="17" height="12" viewBox="0 0 17 12"><rect x="0" y="4" width="3" height="8" rx="1" fill="#374151" opacity=".4"/><rect x="4.5" y="2.5" width="3" height="9.5" rx="1" fill="#374151" opacity=".6"/><rect x="9" y="0" width="3" height="12" rx="1" fill="#374151"/></svg></div></div>
  <div class="hdr">
    <div class="hdr-back"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#2A3357" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg></div>
    <div class="hdr-title">Квартира на Ленина, 12</div>
    <div class="traffic tl-green" id="trafficBadge"><div class="traffic-dot"></div><span id="trafficText">По графику</span></div>
  </div>

  <div class="scene" id="scene">
    <div class="ground"></div>
    <div class="wow-shimmer" id="wowShimmer"></div>
    <div class="wow-glow" id="wowGlow"></div>
    <div class="confetti-box" id="confetti"></div>
    <div class="wow-banner" id="wowBanner"><div class="wow-banner-inner">✓ Дом построен!</div></div>

    <div class="house" id="house">
      <div class="hp s-fnd" id="s0"></div>
      <div class="hp s-socle" id="s1"></div>
      <div class="hp s-w1" id="s2"></div>
      <div class="hp s-ceil" id="s3"></div>
      <div class="hp s-w2" id="s4"></div>
      <div class="hp s-raft" id="s5"></div>
      <div class="hp s-roof" id="s6"></div>
      <div class="hp s-facade" id="s7">
        <div class="fl" style="top:16px"></div>
        <div class="fl" style="top:34px"></div>
        <div class="fl" style="top:78px"></div>
        <div class="fl" style="top:96px"></div>
        <div class="door-surround"></div>
        <div class="door">
          <div class="door-panel" style="top:3px;left:2px;width:9px;height:14px"></div>
          <div class="door-panel" style="top:3px;right:2px;width:9px;height:14px"></div>
          <div class="door-panel" style="bottom:4px;left:2px;width:9px;height:13px"></div>
          <div class="door-panel" style="bottom:4px;right:2px;width:9px;height:13px"></div>
          <div class="door-knob"></div>
        </div>
        <div class="door-lintel"></div>
        <div class="door-step"></div>
      </div>
      <div class="hp s-winch" id="s8">
        <!-- Chimney: bottom sits INTO the roof, top:52 so it overlaps the slope -->
        <div class="chimney-box" style="top:52px;right:55px;width:14px;height:22px">
          <div class="chim-body"></div>
          <div class="chim-cap"></div>
          <div class="chim-smoke">
            <div class="smoke-p" style="width:7px;height:7px;left:0;animation-duration:3s"></div>
            <div class="smoke-p" style="width:5px;height:5px;left:4px;animation-duration:3.5s;animation-delay:1s"></div>
          </div>
        </div>
        <!-- 2F windows — symmetric: left:38, right: 220-38-32=150 -->
        <div class="win" style="left:38px;top:104px;width:32px;height:24px"><div class="win-v"></div><div class="win-h"></div></div>
        <div class="win-lintel" style="left:36px;top:101px;width:36px"></div>
        <div class="win-sill" style="left:36px;top:129px;width:36px"></div>
        <div class="win" style="left:150px;top:104px;width:32px;height:24px"><div class="win-v"></div><div class="win-h"></div></div>
        <div class="win-lintel" style="left:148px;top:101px;width:36px"></div>
        <div class="win-sill" style="left:148px;top:129px;width:36px"></div>
        <!-- 1F windows -->
        <div class="win" style="left:38px;top:168px;width:32px;height:26px"><div class="win-v"></div><div class="win-h"></div></div>
        <div class="win-lintel" style="left:36px;top:165px;width:36px"></div>
        <div class="win-sill" style="left:36px;top:195px;width:36px"></div>
        <div class="win" style="left:150px;top:168px;width:32px;height:26px"><div class="win-v"></div><div class="win-h"></div></div>
        <div class="win-lintel" style="left:148px;top:165px;width:36px"></div>
        <div class="win-sill" style="left:148px;top:195px;width:36px"></div>
      </div>
      <!-- WOW sparkles — only side sparkles, no roof circle -->
      <div class="hp s-wow" id="s9">
        <svg viewBox="0 0 220 240" fill="none">
          <defs>
            <linearGradient id="shG" x1="0" y1="0" x2="1" y2="0">
              <stop offset="0%" stop-color="rgba(255,255,255,0)"/>
              <stop offset="44%" stop-color="rgba(255,255,255,0)"/>
              <stop offset="50%" stop-color="rgba(255,255,255,.4)"/>
              <stop offset="56%" stop-color="rgba(255,255,255,0)"/>
              <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
            </linearGradient>
            <filter id="gl"><feGaussianBlur stdDeviation="3" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
          </defs>
          <rect x="0" y="0" width="220" height="240" fill="url(#shG)" opacity=".6">
            <animateTransform attributeName="transform" type="translate" from="-240 0" to="240 0" dur="2s" repeatCount="indefinite"/>

          <circle cx="25" cy="200" r="1.5" fill="rgba(255,255,255,.3)" filter="url(#gl)"><animate attributeName="r" values=".8;2.5;.8" dur="2.2s" repeatCount="indefinite" begin=".7s"/></circle>
          <circle cx="195" cy="205" r="1.5" fill="rgba(255,255,255,.3)" filter="url(#gl)"><animate attributeName="r" values=".8;2.5;.8" dur="1.6s" repeatCount="indefinite" begin="1s"/></circle>
        </svg>
      </div>
    </div>
  </div>

  <div class="info">
    <div class="pct-row">

    </div>

<script>
/*
  Traffic-light pip colors from the Cluster:
  Red:    #EF4444 → #DC2626   (stages 1-3: early = far from done)
  Yellow: #FEF08A → #FBBF24   (stages 4-6: mid-progress)
  Orange→Green: #F97316→#EA580C (stage 7: transition)
  Green:  #34D399 → #059669   (stages 8-10: close to done)
*/
var ST=[
  {name:'Фундамент',        th:10,  color:['#EF4444','#DC2626']},
  {name:'Цоколь',           th:20,  color:['#EF4444','#DC2626']},
  {name:'Стены 1-го этажа', th:33,  color:['#F97316','#EA580C']},
  {name:'Перекрытие',       th:44,  color:['#F97316','#EA580C']},
  {name:'Стены 2-го этажа', th:55,  color:['#FBBF24','#F59E0B']},
  {name:'Стропила',         th:65,  color:['#FBBF24','#F59E0B']},
  {name:'Кровля',           th:75,  color:['#34D399','#10B981']},
  {name:'Фасадная отделка', th:87,  color:['#34D399','#059669']},
  {name:'Окна и двери',     th:95,  color:['#10B981','#059669']},
  {name:'Дом построен ✓',  th:100, color:['#10B981','#059669']}
];
var pipsEl=document.getElementById('pips');
for(var i=0;i<10;i++){var d=document.createElement('div');d.className='pip';d.id='pip'+i;var f=document.createElement('div');f.className='pip-fill';f.id='pf'+i;d.appendChild(f);pipsEl.appendChild(d)}

function getTL(p){
  if(p>=100)return{c:'tl-green',t:'Завершён',n:'#059669'};
  if(p>=70)return{c:'tl-green',t:'По графику',n:'#059669'};
  if(p>=40)return{c:'tl-yellow',t:'Отставание',n:'#D97706'};
  if(p>=15)return{c:'tl-red',t:'Просрочка',n:'#DC2626'};
  return{c:'tl-blue',t:'Ждёт действия',n:'#4F6EF7'};
}

var prevWow=false;
function render(pct){
  pct=Math.round(Math.max(0,Math.min(100,pct)));
  var si=0;for(var i=0;i<10;i++)if(pct>=ST[i].th)si=i+1;
  var wow=pct>=100,idx=wow?9:Math.min(si,9);
  document.getElementById('pctNum').textContent=pct+'%';
  var tl=getTL(pct);
  document.getElementById('trafficBadge').className='traffic '+tl.c;
  document.getElementById('trafficText').textContent=tl.t;
  document.getElementById('pctNum').style.color=tl.n;
  if(wow){
    document.getElementById('stageLabel').textContent='Все 10 ступеней';
    document.getElementById('stageName').textContent='Дом построен ✓';
    document.getElementById('stageName').style.color='#059669';
  }else{
    document.getElementById('stageLabel').textContent='Ступень '+(idx+1)+' из 10';
    document.getElementById('stageName').textContent=ST[idx].name;
    document.getElementById('stageName').style.color='';
  }
  for(var i=0;i<10;i++){var el=document.getElementById('s'+i);if(el)el.classList.toggle('on',pct>=ST[i].th||(i===si&&!wow))}
  // pips with traffic-light colors
  for(var i=0;i<10;i++){
    var pip=document.getElementById('pip'+i),pf=document.getElementById('pf'+i);
    pip.classList.remove('done','active');
    if(wow||pct>=ST[i].th){
      pip.classList.add('done');
      pf.style.background='linear-gradient(90deg,'+ST[i].color[0]+','+ST[i].color[1]+')';
      pf.style.transform='scaleX(1)';
    }else if(i===si){
      pip.classList.add('active');
      var prev=i?ST[i-1].th:0;
      var l=Math.max(0,Math.min(1,(pct-prev)/(ST[i].th-prev)));
      pf.style.background='linear-gradient(90deg,'+ST[i].color[0]+','+ST[i].color[1]+')';
      pf.style.transform='scaleX('+l+')';
    }else{pf.style.transform='scaleX(0)'}
  }
  document.getElementById('stSteps').textContent=Math.round(pct*.42)+'/42';
  document.getElementById('stDays').textContent=Math.max(0,34-Math.round(pct*.34));
  document.getElementById('stStages').textContent=si+'/10';

  var scene=document.getElementById('scene'),shim=document.getElementById('wowShimmer'),glow=document.getElementById('wowGlow'),h=document.getElementById('house');
  if(wow){
    scene.classList.add('wow-bg');shim.classList.add('on');glow.classList.add('on');
    h.classList.add('wow-pulse');
    if(!prevWow){
      h.classList.add('wow-bounce');setTimeout(function(){h.classList.remove('wow-bounce')},800);
      setTimeout(function(){document.getElementById('wowBanner').classList.add('on')},300);
      launchConfetti();setTimeout(launchConfetti,800);setTimeout(launchConfetti,1600);
      for(var j=0;j<10;j++){(function(j){setTimeout(function(){
        var p=document.getElementById('pip'+j);p.classList.add('celebrate');
        setTimeout(function(){p.classList.remove('celebrate')},600);
      },600+j*60)})(j)}
      document.querySelectorAll('.stat').forEach(function(s,i){
        setTimeout(function(){s.classList.add('wow-pulse');setTimeout(function(){s.classList.remove('wow-pulse')},700)},800+i*200);
      });
    }
  }else{
    scene.classList.remove('wow-bg');shim.classList.remove('on');glow.classList.remove('on');
    h.classList.remove('wow-pulse');
    document.getElementById('wowBanner').classList.remove('on');
  }
  prevWow=wow;
}

function launchConfetti(){
  var c=document.getElementById('confetti');c.innerHTML='';
  var cols=['#34D399','#10B981','#059669','#4F6EF7','#3A56D4','#64748B','#94A3B8','#818CF8','#6366F1','#A78BFA','#F59E0B','#FBBF24'];
  for(var i=0;i<120;i++){
    var el=document.createElement('div');el.className='cp';
    var sz=4+Math.random()*10;
    el.style.cssText='left:'+Math.random()*100+'%;width:'+sz+'px;height:'+sz+'px;background:'+cols[~~(Math.random()*cols.length)]+';border-radius:'+(Math.random()>.5?'50%':'1px')+';opacity:.75;animation-delay:'+Math.random()*1.2+'s;animation-duration:'+(2+Math.random()*1.8)+'s;';
    c.appendChild(el);
  }
  setTimeout(function(){c.innerHTML=''},6000);
}

var slider=document.getElementById('slider');
slider.addEventListener('input',function(){render(+slider.value)});
render(0);
setTimeout(function(){var v=0,iv=setInterval(function(){v++;slider.value=v;render(v);if(v>=65)clearInterval(iv)},18)},600);
</script>
</body>
</html>
