name: CI

on:
  push:
    branches: [main, dev_v1]
  pull_request:
    branches: [main, dev_v1]

jobs:
  lint-test-build:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: repair_control
        ports: ['5432:5432']
        options: >-
          --health-cmd="pg_isready -U postgres"
          --health-interval=5s
          --health-timeout=3s
          --health-retries=10

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/repair_control?schema=public
      JWT_ACCESS_SECRET: ci_access_secret_min_16_chars_long
      JWT_REFRESH_SECRET: ci_refresh_secret_min_16_chars_long
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install deps
        working-directory: backend
        run: npm ci

      - name: Prisma generate
        working-directory: backend
        run: npx prisma generate

      - name: Prisma migrate deploy
        working-directory: backend
        run: npx prisma migrate deploy

      - name: Lint
        working-directory: backend
        run: npm run lint:check

      - name: Test (unit)
        working-directory: backend
        run: npm run test -- --coverage

      - name: Build
        working-directory: backend
        run: npm run build

  e2e:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: repair_control_test
        ports: ['5432:5432']
        options: >-
          --health-cmd="pg_isready -U postgres"
          --health-interval=5s
          --health-timeout=3s
          --health-retries=10

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/repair_control_test?schema=public
      JWT_ACCESS_SECRET: ci_access_secret_min_16_chars_long
      JWT_REFRESH_SECRET: ci_refresh_secret_min_16_chars_long
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install deps
        working-directory: backend
        run: npm ci

      - name: Prisma generate
        working-directory: backend
        run: npx prisma generate

      - name: Copy .env.test
        working-directory: backend
        run: cp .env.example .env.test && sed -i 's|repair_control?schema=public|repair_control_test?schema=public|' .env.test

      - name: Run E2E
        working-directory: backend
        run: npm run test:e2e
