name: CI

on:
  push:
    branches: [main, dev_v1]
  pull_request:
    branches: [main, dev_v1]

jobs:
  lint-test-build:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: repair_control
        ports: ['5432:5432']
        options: >-
          --health-cmd="pg_isready -U postgres"
          --health-interval=5s
          --health-timeout=3s
          --health-retries=10

      redis:
        image: redis:7-alpine
        ports: ['6379:6379']
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=5s
          --health-timeout=3s
          --health-retries=10

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/repair_control?schema=public
      REDIS_URL: redis://localhost:6379
      JWT_ACCESS_SECRET: ci_access_secret_min_16_chars_long
      JWT_REFRESH_SECRET: ci_refresh_secret_min_16_chars_long
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      FCM_ENABLED: "false"
      LOG_LEVEL: warn
      LOG_PRETTY: "false"
      METRICS_TOKEN: ci-metrics

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install deps
        working-directory: backend
        run: npm ci

      - name: Prisma generate
        working-directory: backend
        run: npx prisma generate

      - name: Prisma migrate deploy
        working-directory: backend
        run: npx prisma migrate deploy

      - name: Lint
        working-directory: backend
        run: npm run lint:check

      - name: Test (unit + coverage)
        working-directory: backend
        run: npm run test -- --coverage

      - name: Build
        working-directory: backend
        run: npm run build

      - name: Export OpenAPI v1
        working-directory: backend
        run: npm run openapi:export

      - name: Upload OpenAPI artifact
        uses: actions/upload-artifact@v4
        with:
          name: openapi-v1
          path: backend/docs/openapi.v1.json

  e2e:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: repair_control_test
        ports: ['5432:5432']
        options: >-
          --health-cmd="pg_isready -U postgres"
          --health-interval=5s
          --health-timeout=3s
          --health-retries=10

      redis:
        image: redis:7-alpine
        ports: ['6379:6379']
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=5s
          --health-timeout=3s
          --health-retries=10

      minio:
        image: minio/minio:latest
        ports: ['9000:9000', '9001:9001']
        env:
          MINIO_ROOT_USER: minioadmin
          MINIO_ROOT_PASSWORD: minioadmin
        options: >-
          --health-cmd="curl -f http://localhost:9000/minio/health/live || exit 1"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/repair_control_test?schema=public
      REDIS_URL: redis://localhost:6379
      JWT_ACCESS_SECRET: ci_access_secret_min_16_chars_long
      JWT_REFRESH_SECRET: ci_refresh_secret_min_16_chars_long
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      MINIO_BUCKET: repair-control-test
      FCM_ENABLED: "false"
      LOG_LEVEL: warn
      LOG_PRETTY: "false"
      METRICS_TOKEN: ci-metrics

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install deps
        working-directory: backend
        run: npm ci

      - name: Prisma generate
        working-directory: backend
        run: npx prisma generate

      - name: Prepare .env.test
        working-directory: backend
        run: |
          cp .env.example .env.test
          sed -i 's|repair_control?schema=public|repair_control_test?schema=public|' .env.test
          echo "MINIO_BUCKET=repair-control-test" >> .env.test
          echo "FCM_ENABLED=false" >> .env.test
          echo "LOG_LEVEL=warn" >> .env.test
          echo "METRICS_TOKEN=ci-metrics" >> .env.test

      - name: Run E2E
        working-directory: backend
        run: npm run test:e2e

  docker-build:
    runs-on: ubuntu-latest
    needs: [lint-test-build]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: false
          tags: repair-control/backend:ci-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build admin-web image
        uses: docker/build-push-action@v6
        with:
          context: ./backend/apps/admin-web
          file: ./backend/apps/admin-web/Dockerfile
          push: false
          tags: repair-control/admin-web:ci-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
