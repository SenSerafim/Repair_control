# Staging stack для Repair Control backend.
# Поверх docker-compose.yml добавляет api-сервис и admin-web (nginx static).
# Запуск: docker compose -f docker-compose.yml -f docker-compose.staging.yml --env-file .env.staging up -d
services:
  postgres:
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-repair_control}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"

  redis:
    ports:
      - "${REDIS_PORT:-6379}:6379"

  # Staging использует внешний Selectel S3 — локальный MinIO container отключён.
  # Если нужно вернуться на локальный MinIO — раскомментируйте блок ниже
  # и проставьте MINIO_ENDPOINT=minio / MINIO_USE_SSL=false в api.environment.
  # minio:
  #   environment:
  #     MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minioadmin}
  #     MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minioadmin}
  #   ports:
  #     - "${MINIO_API_PORT:-9000}:9000"
  #     - "${MINIO_CONSOLE_PORT:-9001}:9001"

  api:
    # Образ собирается в CI (.github/workflows/backend-image.yml) и
    # публикуется в GHCR. Локальная сборка (build:) убрана — на проде
    # 14GB диска не хватает на multi-stage build (ENOSPC при export).
    #
    # Override через .env.staging:
    #   API_IMAGE=ghcr.io/softspace-dev/repair-control/backend:main
    # Default — main с GHCR (production), для PR можно подменить на :sha-XXX.
    image: ${API_IMAGE:-ghcr.io/softspace-dev/repair-control/backend:main}
    restart: unless-stopped
    depends_on:
      postgres: { condition: service_healthy }
      redis:    { condition: service_healthy }
    environment:
      NODE_ENV: staging
      PORT: 3000
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-repair_control}?schema=public
      REDIS_URL: redis://redis:6379
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      JWT_ACCESS_TTL: 900
      JWT_REFRESH_TTL: 2592000
      BCRYPT_COST: 12
      SMS_PROVIDER: ${SMS_PROVIDER:-stub}
      SMS_API_KEY: ${SMS_API_KEY:-}
      # Selectel S3 (s3.ru-7.storage.selcloud.ru, bucket repair-bucket-test).
      MINIO_ENDPOINT: ${MINIO_ENDPOINT:-s3.ru-7.storage.selcloud.ru}
      MINIO_PORT: ${MINIO_PORT:-443}
      MINIO_USE_SSL: "${MINIO_USE_SSL:-true}"
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY}
      MINIO_BUCKET: ${MINIO_BUCKET:-repair-bucket-test}
      MINIO_REGION: ${MINIO_REGION:-ru-7}
      MINIO_PATH_STYLE: "${MINIO_PATH_STYLE:-true}"
      MINIO_PRESIGN_TTL_SECONDS: 300
      FILE_MAX_SIZE_MB: 25
      FILE_ALLOWED_MIMES: "image/jpeg,image/png,application/pdf,application/vnd.openxmlformats-officedocument.spreadsheetml.sheet,application/vnd.openxmlformats-officedocument.wordprocessingml.document"
      RATE_LIMIT_LOGIN_MAX: 5
      RATE_LIMIT_LOGIN_WINDOW_SECONDS: 300
      RATE_LIMIT_LOGIN_BLOCK_SECONDS: 300
      RECOVERY_MAX_ATTEMPTS: 3
      RECOVERY_BLOCK_SECONDS: 300
      # S5
      SENTRY_DSN: ${SENTRY_DSN:-}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      LOG_PRETTY: "${LOG_PRETTY:-true}"
      METRICS_TOKEN: ${METRICS_TOKEN:-}
      FCM_ENABLED: ${FCM_ENABLED:-false}
      FCM_PROJECT_ID: ${FCM_PROJECT_ID:-}
      FCM_CLIENT_EMAIL: ${FCM_CLIENT_EMAIL:-}
      FCM_PRIVATE_KEY: ${FCM_PRIVATE_KEY:-}
      EXPORT_TEMP_DIR: /tmp/repair-control-exports
      PDF_LOGO_URL: ${PDF_LOGO_URL:-}
      ZIP_MAX_SIZE_MB: 500
      SUPPORT_TELEGRAM_URL: ${SUPPORT_TELEGRAM_URL:-https://t.me/repaircontrol_support}
      WS_CORS_ORIGIN: ${WS_CORS_ORIGIN:-*}
      WS_PING_INTERVAL_MS: 25000
      WS_PING_TIMEOUT_MS: 20000
    ports:
      - "${API_PORT:-3000}:3000"
    # На старте api-контейнер применяет миграции и запускает сид (опционально).
    # `exec node` обязателен, чтобы node стал PID 1 под tini и pino
    # выгружал stdout без буферизации. Без exec NestJS с bufferLogs=true
    # висит silent после startup.
    # Путь — nest-cli CLI с nested `apps/api/`: dist/apps/api/apps/api/src/main.js.
    command: >
      sh -c "npx prisma migrate deploy && exec node dist/apps/api/apps/api/src/main.js"
    healthcheck:
      # `db:true,redis:true` достаточно для healthy. Status может быть
      # `degraded` если minio listBuckets медленно отвечает (>500ms),
      # но это не блокирует работу API.
      test:
        ["CMD-SHELL", "wget -q -O- http://localhost:3000/healthz | grep -q '\"db\":true' && wget -q -O- http://localhost:3000/healthz | grep -q '\"redis\":true'"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  admin-web:
    build:
      context: ./apps/admin-web
      dockerfile: Dockerfile
    image: repair-control/admin-web:${ADMIN_IMAGE_TAG:-staging}
    restart: unless-stopped
    depends_on:
      - api
    environment:
      VITE_API_BASE_URL: ${ADMIN_API_URL:-http://localhost:3000}
    ports:
      - "${ADMIN_PORT:-8080}:80"
